name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Required for the modern GitHub Actions Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress builds
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Cache IDF tools (~/.espressif) ──────────────────────────────────
      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-v5.4.1-${{ runner.os }}

      # ── Fetch components, patch, and build — all inside one Docker context ──
      # Logic lives in ci_build.sh to avoid multi-line command quoting issues
      # with esp-idf-ci-action. The script: reconfigure → patch arduino-esp32
      # for IDF 5.4.1 → full build.
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32c6
          command: bash ci_build.sh

      # ── Assemble Pages artifact ───────────────────────────────────────────
      # Merge repo docs/ (index.html, manifest.json) with built binaries.
      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          cp docs/index.html                             _site/index.html
          cp docs/manifest.json                          _site/manifest.json
          cp build/bootloader/bootloader.bin             _site/bootloader.bin
          cp build/partition_table/partition-table.bin   _site/partition-table.bin
          cp build/ota_data_initial.bin                  _site/ota_data_initial.bin
          cp build/TinyENV_Sensor_Thread.bin             _site/garden-sensor.bin
          echo "Pages artifact contents:"
          ls -lh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
