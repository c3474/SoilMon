<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'Courier New', monospace" font-size="12">

  <!-- ═══════════════════════════════════════ BACKGROUND ═══ -->
  <rect width="960" height="720" fill="#1a1a2e"/>

  <!-- ═══════════════════════════════════════ LEGEND ═══════ -->
  <g transform="translate(20,640)">
    <text fill="#888" font-size="11">Wire colors:</text>
    <line x1="95" y1="-4" x2="120" y2="-4" stroke="#e63946" stroke-width="2"/>
    <text x="125" fill="#e63946" font-size="11">Power</text>
    <line x1="185" y1="-4" x2="210" y2="-4" stroke="#444" stroke-width="2"/>
    <text x="215" fill="#888" font-size="11">GND</text>
    <line x1="255" y1="-4" x2="280" y2="-4" stroke="#457b9d" stroke-width="2"/>
    <text x="285" fill="#457b9d" font-size="11">I²C</text>
    <line x1="315" y1="-4" x2="340" y2="-4" stroke="#2a9d8f" stroke-width="2"/>
    <text x="345" fill="#2a9d8f" font-size="11">1-Wire</text>
    <line x1="405" y1="-4" x2="430" y2="-4" stroke="#e9c46a" stroke-width="2"/>
    <text x="435" fill="#e9c46a" font-size="11">GPIO/ADC</text>
    <line x1="510" y1="-4" x2="535" y2="-4" stroke="#f4a261" stroke-width="2"/>
    <text x="540" fill="#f4a261" font-size="11">Battery</text>
  </g>

  <!-- ═══════════════════════════════════════ HELPERS ═══════ -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       SOLAR PANEL
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(30,40)">
    <rect width="120" height="75" rx="6" fill="#0d3b66" stroke="#457b9d" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" fill="#a8dadc" font-weight="bold">Solar Panel</text>
    <text x="60" y="38" text-anchor="middle" fill="#888" font-size="11">6V · 1–2W</text>
    <text x="15" y="58" fill="#e63946" font-size="11">＋</text>
    <text x="90" y="58" fill="#888" font-size="11">－</text>
    <line x1="22" y1="62" x2="22" y2="75" stroke="#e63946" stroke-width="2"/>
    <line x1="100" y1="62" x2="100" y2="75" stroke="#444" stroke-width="2"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       1N5819 DIODE  (inline, solar+ → TP4056 IN+)
  ════════════════════════════════════════════════════════════ -->
  <!-- wire from solar+ out to diode -->
  <line x1="52" y1="115" x2="52" y2="140" stroke="#e63946" stroke-width="2"/>
  <g transform="translate(22,140)">
    <rect width="60" height="34" rx="4" fill="#2d2d44" stroke="#e63946" stroke-width="1.2"/>
    <text x="30" y="13" text-anchor="middle" fill="#e9c46a" font-size="11" font-weight="bold">1N5819</text>
    <text x="30" y="26" text-anchor="middle" fill="#888" font-size="10">Schottky</text>
  </g>
  <!-- wire from diode down to TP4056 IN+ -->
  <line x1="52" y1="174" x2="52" y2="210" stroke="#e63946" stroke-width="2"/>
  <!-- solar GND wire down -->
  <line x1="130" y1="115" x2="130" y2="210" stroke="#444" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       TP4056 CHARGE CONTROLLER
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(22,210)">
    <rect width="160" height="100" rx="6" fill="#0d3b66" stroke="#457b9d" stroke-width="1.5"/>
    <text x="80" y="20" text-anchor="middle" fill="#a8dadc" font-weight="bold">TP4056</text>
    <text x="80" y="35" text-anchor="middle" fill="#888" font-size="11">w/ protection</text>
    <!-- Pins left side -->
    <text x="6"  y="58" fill="#e63946" font-size="10">IN＋</text>
    <text x="6"  y="74" fill="#444"    font-size="10">IN－</text>
    <!-- Pins right side -->
    <text x="104" y="58" fill="#f4a261" font-size="10">B＋</text>
    <text x="104" y="74" fill="#f4a261" font-size="10">B－</text>
    <!-- Bottom pins -->
    <text x="22"  y="94" fill="#e63946" font-size="10">OUT＋</text>
    <text x="90"  y="94" fill="#444"    font-size="10">OUT－</text>
    <!-- connector dots -->
    <circle cx="30"  cy="53" r="3" fill="#e63946"/>
    <circle cx="30"  cy="69" r="3" fill="#444"/>
    <circle cx="130" cy="53" r="3" fill="#f4a261"/>
    <circle cx="130" cy="69" r="3" fill="#f4a261"/>
    <circle cx="45"  cy="98" r="3" fill="#e63946"/>
    <circle cx="110" cy="98" r="3" fill="#444"/>
  </g>
  <!-- IN+ from diode -->
  <line x1="52" y1="210" x2="52" y2="263" stroke="#e63946" stroke-width="2"/>
  <!-- IN- from solar GND -->
  <line x1="130" y1="210" x2="52" y2="279" stroke="#444" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       18650 BATTERY
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(210,210)">
    <rect width="130" height="60" rx="8" fill="#1a3a1a" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="65" y="22" text-anchor="middle" fill="#90be6d" font-weight="bold">18650 Cell</text>
    <text x="65" y="38" text-anchor="middle" fill="#888" font-size="11">2000–3500 mAh</text>
    <text x="18" y="54" fill="#e63946" font-size="11">＋</text>
    <text x="98" y="54" fill="#444"    font-size="11">－</text>
    <circle cx="24"  cy="58" r="3" fill="#f4a261"/>
    <circle cx="106" cy="58" r="3" fill="#f4a261"/>
  </g>
  <!-- Battery + → TP4056 B+ -->
  <line x1="234" y1="268" x2="182" y2="263" stroke="#f4a261" stroke-width="2"/>
  <!-- Battery - → TP4056 B- -->
  <line x1="316" y1="268" x2="182" y2="279" stroke="#f4a261" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       XIAO ESP32-C6  — center piece
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(360,260)">
    <rect width="230" height="200" rx="8" fill="#1e1e3a" stroke="#6a4fc8" stroke-width="2"/>
    <text x="115" y="22" text-anchor="middle" fill="#c4a0f5" font-weight="bold" font-size="13">XIAO ESP32-C6</text>

    <!-- Left-side pins -->
    <text x="8"  y="50"  fill="#e63946" font-size="10">3.3V</text>
    <text x="8"  y="66"  fill="#444"    font-size="10">GND</text>
    <text x="8"  y="82"  fill="#e9c46a" font-size="10">A0</text>
    <text x="8"  y="98"  fill="#457b9d" font-size="10">GPIO0 SDA</text>
    <text x="8"  y="114" fill="#457b9d" font-size="10">GPIO1 SCL</text>
    <text x="8"  y="130" fill="#2a9d8f" font-size="10">GPIO2</text>
    <text x="8"  y="146" fill="#e9c46a" font-size="10">GPIO3</text>
    <text x="8"  y="162" fill="#e9c46a" font-size="10">GPIO4</text>
    <!-- Right-side pins -->
    <text x="175" y="66"  text-anchor="end" fill="#e63946" font-size="10">BAT＋</text>
    <text x="175" y="82"  text-anchor="end" fill="#444"    font-size="10">BAT－</text>

    <!-- connector dots left -->
    <circle cx="6"   cy="46"  r="3" fill="#e63946"/>
    <circle cx="6"   cy="62"  r="3" fill="#444"/>
    <circle cx="6"   cy="78"  r="3" fill="#e9c46a"/>
    <circle cx="6"   cy="94"  r="3" fill="#457b9d"/>
    <circle cx="6"   cy="110" r="3" fill="#457b9d"/>
    <circle cx="6"   cy="126" r="3" fill="#2a9d8f"/>
    <circle cx="6"   cy="142" r="3" fill="#e9c46a"/>
    <circle cx="6"   cy="158" r="3" fill="#e9c46a"/>
    <!-- connector dots right -->
    <circle cx="224" cy="62"  r="3" fill="#e63946"/>
    <circle cx="224" cy="78"  r="3" fill="#444"/>
  </g>

  <!-- ── TP4056 OUT+ → XIAO BAT+ ── -->
  <line x1="67"  y1="308" x2="67"  y2="390" stroke="#e63946" stroke-width="2"/>
  <line x1="67"  y1="390" x2="584" y2="390" stroke="#e63946" stroke-width="2"/>
  <line x1="584" y1="390" x2="584" y2="322" stroke="#e63946" stroke-width="2"/>
  <!-- TP4056 OUT- → XIAO BAT- -->
  <line x1="132" y1="308" x2="132" y2="400" stroke="#444" stroke-width="2"/>
  <line x1="132" y1="400" x2="590" y2="400" stroke="#444" stroke-width="2"/>
  <line x1="590" y1="400" x2="590" y2="338" stroke="#444" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       BME280
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(660,260)">
    <rect width="140" height="110" rx="6" fill="#1a2f1a" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="70" y="20" text-anchor="middle" fill="#90be6d" font-weight="bold">BME280</text>
    <text x="70" y="34" text-anchor="middle" fill="#888" font-size="10">3.3V · I²C</text>
    <text x="6"  y="56" fill="#e63946" font-size="10">VCC</text>
    <text x="6"  y="72" fill="#444"    font-size="10">GND</text>
    <text x="6"  y="88" fill="#457b9d" font-size="10">SDA</text>
    <text x="6"  y="104" fill="#457b9d" font-size="10">SCL</text>
    <circle cx="4"  cy="52"  r="3" fill="#e63946"/>
    <circle cx="4"  cy="68"  r="3" fill="#444"/>
    <circle cx="4"  cy="84"  r="3" fill="#457b9d"/>
    <circle cx="4"  cy="100" r="3" fill="#457b9d"/>
  </g>

  <!-- XIAO 3.3V → BME280 VCC -->
  <line x1="366" y1="306" x2="340" y2="306" stroke="#e63946" stroke-width="2"/>
  <line x1="340" y1="306" x2="340" y2="248" stroke="#e63946" stroke-width="2"/>
  <line x1="340" y1="248" x2="664" y2="248" stroke="#e63946" stroke-width="2"/>
  <line x1="664" y1="248" x2="664" y2="312" stroke="#e63946" stroke-width="2"/>
  <!-- XIAO GND → BME280 GND -->
  <line x1="366" y1="322" x2="350" y2="322" stroke="#444" stroke-width="2"/>
  <line x1="350" y1="322" x2="350" y2="242" stroke="#444" stroke-width="2"/>
  <line x1="350" y1="242" x2="658" y2="242" stroke="#444" stroke-width="2"/>
  <line x1="658" y1="242" x2="658" y2="328" stroke="#444" stroke-width="2"/>
  <!-- XIAO GPIO0 → BME280 SDA -->
  <line x1="366" y1="354" x2="655" y2="354" stroke="#457b9d" stroke-width="2"/>
  <!-- XIAO GPIO1 → BME280 SCL -->
  <line x1="366" y1="370" x2="656" y2="370" stroke="#457b9d" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ═══════════════════════════════════════════════════════
       4.7kΩ PULL-UP  (GPIO2 line → 3.3V)
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(660,410)">
    <rect width="140" height="36" rx="4" fill="#2d2d44" stroke="#e9c46a" stroke-width="1.2"/>
    <text x="70" y="14" text-anchor="middle" fill="#e9c46a" font-size="11" font-weight="bold">4.7 kΩ</text>
    <text x="70" y="28" text-anchor="middle" fill="#888" font-size="10">pull-up resistor</text>
    <circle cx="4"   cy="18" r="3" fill="#2a9d8f"/>
    <circle cx="136" cy="18" r="3" fill="#e63946"/>
  </g>
  <!-- Resistor one end → GPIO2 wire (joins below) -->
  <line x1="664" y1="428" x2="664" y2="380" stroke="#2a9d8f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Resistor other end → 3.3V rail -->
  <line x1="796" y1="428" x2="820" y2="428" stroke="#e63946" stroke-width="1.5"/>
  <line x1="820" y1="428" x2="820" y2="248" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════════════════════════════════════
       DS18B20
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(660,490)">
    <rect width="140" height="90" rx="6" fill="#2d1a0d" stroke="#f4a261" stroke-width="1.5"/>
    <text x="70" y="20" text-anchor="middle" fill="#f4a261" font-weight="bold">DS18B20</text>
    <text x="70" y="34" text-anchor="middle" fill="#888" font-size="10">1-Wire · waterproof</text>
    <text x="6"  y="56" fill="#e63946" font-size="10">VCC (MOSFET)</text>
    <text x="6"  y="72" fill="#444"    font-size="10">GND</text>
    <text x="6"  y="88" fill="#2a9d8f" font-size="10">DATA</text>
    <circle cx="4"  cy="52" r="3" fill="#e63946"/>
    <circle cx="4"  cy="68" r="3" fill="#444"/>
    <circle cx="4"  cy="84" r="3" fill="#2a9d8f"/>
  </g>
  <!-- GPIO2 → DS18B20 DATA -->
  <line x1="366" y1="386" x2="630" y2="386" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="630" y1="386" x2="630" y2="574" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="630" y1="574" x2="664" y2="574" stroke="#2a9d8f" stroke-width="2"/>
  <!-- DS18B20 GND -->
  <line x1="664" y1="558" x2="645" y2="558" stroke="#444" stroke-width="2"/>
  <line x1="645" y1="558" x2="645" y2="610" stroke="#444" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       N-CHANNEL MOSFET  (2N7000 / BS170)
       Low-side switch: drain→sensor GNDs, source→board GND
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(200,450)">
    <rect width="130" height="80" rx="6" fill="#2d1f0d" stroke="#e9c46a" stroke-width="1.5"/>
    <text x="65" y="20" text-anchor="middle" fill="#e9c46a" font-weight="bold">N-CH MOSFET</text>
    <text x="65" y="34" text-anchor="middle" fill="#888" font-size="10">2N7000 / BS170</text>
    <text x="6"  y="54" fill="#e9c46a" font-size="10">Gate</text>
    <text x="6"  y="70" fill="#e63946" font-size="10">Drain→sensors</text>
    <text x="75" y="74" fill="#444"    font-size="10">Source→GND</text>
    <circle cx="4"   cy="50" r="3" fill="#e9c46a"/>
    <circle cx="4"   cy="66" r="3" fill="#e63946"/>
    <circle cx="126" cy="70" r="3" fill="#444"/>
  </g>
  <!-- XIAO GPIO4 → MOSFET Gate -->
  <line x1="366" y1="418" x2="310" y2="418" stroke="#e9c46a" stroke-width="2"/>
  <line x1="310" y1="418" x2="310" y2="500" stroke="#e9c46a" stroke-width="2"/>
  <line x1="310" y1="500" x2="204" y2="500" stroke="#e9c46a" stroke-width="2"/>
  <!-- MOSFET Source → GND bus -->
  <line x1="326" y1="520" x2="360" y2="520" stroke="#444" stroke-width="2"/>
  <line x1="360" y1="520" x2="360" y2="610" stroke="#444" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       CAPACITIVE SOIL SENSOR
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(200,570)">
    <rect width="130" height="80" rx="6" fill="#1a2f1a" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="65" y="18" text-anchor="middle" fill="#90be6d" font-weight="bold">Soil Sensor</text>
    <text x="65" y="31" text-anchor="middle" fill="#888" font-size="10">Capacitive v1.2</text>
    <text x="6"  y="50" fill="#e63946" font-size="10">VCC (MOSFET)</text>
    <text x="6"  y="65" fill="#444"    font-size="10">GND</text>
    <text x="6"  y="80" fill="#e9c46a" font-size="10">AOUT → GPIO3</text>
    <circle cx="4"  cy="46" r="3" fill="#e63946"/>
    <circle cx="4"  cy="61" r="3" fill="#444"/>
    <circle cx="4"  cy="76" r="3" fill="#e9c46a"/>
  </g>
  <!-- MOSFET Drain → Soil sensor VCC + DS18B20 VCC -->
  <line x1="204" y1="516" x2="180" y2="516" stroke="#e63946" stroke-width="2"/>
  <line x1="180" y1="516" x2="180" y2="616" stroke="#e63946" stroke-width="2"/>
  <line x1="180" y1="616" x2="204" y2="616" stroke="#e63946" stroke-width="2"/>
  <!-- DS18B20 VCC from same MOSFET drain -->
  <line x1="180" y1="516" x2="645" y2="516" stroke="#e63946" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="645" y1="516" x2="664" y2="542" stroke="#e63946" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Soil sensor GND -->
  <line x1="204" y1="631" x2="170" y2="631" stroke="#444" stroke-width="2"/>
  <line x1="170" y1="631" x2="170" y2="610" stroke="#444" stroke-width="2"/>
  <!-- AOUT → XIAO GPIO3 -->
  <line x1="204" y1="646" x2="185" y2="646" stroke="#e9c46a" stroke-width="2"/>
  <line x1="185" y1="646" x2="185" y2="660" stroke="#e9c46a" stroke-width="2"/>
  <line x1="185" y1="660" x2="480" y2="660" stroke="#e9c46a" stroke-width="2"/>
  <line x1="480" y1="660" x2="480" y2="460" stroke="#e9c46a" stroke-width="2"/>
  <line x1="480" y1="460" x2="366" y2="402" stroke="#e9c46a" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       XIAO A0 — Battery voltage divider note
  ════════════════════════════════════════════════════════════ -->
  <g transform="translate(660,140)">
    <rect width="140" height="50" rx="4" fill="#2d2d44" stroke="#888" stroke-width="1"/>
    <text x="70" y="18" text-anchor="middle" fill="#aaa" font-size="11" font-weight="bold">Battery Divider</text>
    <text x="70" y="32" text-anchor="middle" fill="#888" font-size="10">2× 220kΩ → A0</text>
    <text x="70" y="44" text-anchor="middle" fill="#888" font-size="10">VBAT_GAIN = 1.0123</text>
  </g>
  <!-- A0 wire from XIAO -->
  <line x1="366" y1="338" x2="340" y2="338" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="340" y1="338" x2="340" y2="165" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="340" y1="165" x2="660" y2="165" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ═══════════════════════════════════════════════════════
       GND BUS at bottom
  ════════════════════════════════════════════════════════════ -->
  <line x1="130" y1="610" x2="860" y2="610" stroke="#444" stroke-width="3"/>
  <text x="490" y="625" text-anchor="middle" fill="#555" font-size="11">Common GND</text>
  <!-- DS18B20 GND to bus -->
  <line x1="645" y1="558" x2="645" y2="610" stroke="#444" stroke-width="2"/>
  <!-- TP4056 OUT- to bus -->
  <line x1="132" y1="400" x2="132" y2="610" stroke="#444" stroke-width="2"/>
  <!-- BME280 GND to bus -->
  <line x1="658" y1="328" x2="658" y2="610" stroke="#444" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════════
       TITLE
  ════════════════════════════════════════════════════════════ -->
  <text x="480" y="26" text-anchor="middle" fill="#c4a0f5" font-size="16" font-weight="bold">Garden Sensor — Wiring Diagram</text>
  <text x="480" y="44" text-anchor="middle" fill="#555" font-size="11">XIAO ESP32-C6 · BME280 · DS18B20 · Capacitive Soil · 18650 + Solar</text>

</svg>
