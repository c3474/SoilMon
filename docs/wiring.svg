<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 730" font-family="'Courier New', monospace" font-size="11">

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="980" height="730" fill="#1a1a2e"/>

  <!-- ═══ TITLE ═══ -->
  <text x="490" y="24" text-anchor="middle" fill="#c4a0f5" font-size="15" font-weight="bold">Garden Sensor — Wiring Diagram</text>
  <text x="490" y="40" text-anchor="middle" fill="#555" font-size="10">XIAO ESP32-C6 · BME280 · DS18B20 · Capacitive Soil Sensor · 18650 + Solar</text>

  <!-- ════════════════════════════════════════════════════════════
       POWER CHAIN  (left column)
  ═════════════════════════════════════════════════════════════ -->

  <!-- SOLAR PANEL  (15, 55)  110×65 -->
  <rect x="15" y="55" width="110" height="65" rx="5" fill="#0d3b66" stroke="#457b9d" stroke-width="1.5"/>
  <text x="70" y="74"  text-anchor="middle" fill="#a8dadc" font-weight="bold">Solar Panel</text>
  <text x="70" y="88"  text-anchor="middle" fill="#888"    font-size="10">6 V · 1–2 W</text>
  <text x="30" y="106" fill="#e63946" font-size="10">＋</text>
  <text x="80" y="106" fill="#666"    font-size="10">－</text>
  <circle cx="38"  cy="120" r="3" fill="#e63946"/>   <!-- solar+ pin -->
  <circle cx="102" cy="120" r="3" fill="#555"/>       <!-- solar− pin -->

  <!-- solar+ down to diode anode -->
  <line x1="38" y1="120" x2="38" y2="140" stroke="#e63946" stroke-width="2"/>

  <!-- 1N5819 DIODE  (15, 140)  80×28 -->
  <rect x="15" y="140" width="80" height="28" rx="3" fill="#2d2d44" stroke="#e9c46a" stroke-width="1.2"/>
  <text x="55" y="152" text-anchor="middle" fill="#e9c46a" font-size="10" font-weight="bold">1N5819</text>
  <text x="55" y="163" text-anchor="middle" fill="#666" font-size="9">Schottky diode</text>
  <circle cx="15" cy="154" r="3" fill="#e63946"/>   <!-- anode  (left) -->
  <circle cx="95" cy="154" r="3" fill="#e63946"/>   <!-- cathode (right) -->

  <!-- diode cathode down to TP4056 IN+ -->
  <line x1="95" y1="154" x2="95" y2="188" stroke="#e63946" stroke-width="2"/>
  <!-- junction: diode anode ↔ solar+ wire -->
  <line x1="15" y1="154" x2="38" y2="154" stroke="#e63946" stroke-width="2"/>

  <!-- solar− straight down to GND bus (y=638) -->
  <line x1="102" y1="120" x2="102" y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- TP4056  (15, 188)  160×110 -->
  <rect x="15" y="188" width="160" height="110" rx="5" fill="#0d3b66" stroke="#457b9d" stroke-width="1.5"/>
  <text x="95" y="207" text-anchor="middle" fill="#a8dadc" font-weight="bold">TP4056</text>
  <text x="95" y="220" text-anchor="middle" fill="#888" font-size="10">with protection circuit</text>
  <text x="20" y="241" fill="#e63946" font-size="10">IN＋</text>
  <text x="20" y="258" fill="#555"    font-size="10">IN－</text>
  <text x="105" y="241" fill="#f4a261" font-size="10">BAT＋</text>
  <text x="105" y="258" fill="#f4a261" font-size="10">BAT－</text>
  <text x="35"  y="292" fill="#e63946" font-size="10">OUT＋</text>
  <text x="98"  y="292" fill="#555"    font-size="10">OUT－</text>
  <circle cx="95"  cy="236" r="3" fill="#e63946"/>   <!-- IN+ (top-center area, routes from diode) -->
  <circle cx="15"  cy="253" r="3" fill="#555"/>       <!-- IN- left edge -->
  <circle cx="175" cy="236" r="3" fill="#f4a261"/>    <!-- BAT+ right -->
  <circle cx="175" cy="252" r="3" fill="#f4a261"/>    <!-- BAT- right -->
  <circle cx="55"  cy="298" r="3" fill="#e63946"/>    <!-- OUT+ bottom -->
  <circle cx="115" cy="298" r="3" fill="#555"/>       <!-- OUT- bottom -->

  <!-- diode cathode → TP4056 IN+ (top route) -->
  <line x1="95" y1="188" x2="95" y2="236" stroke="#e63946" stroke-width="2"/>
  <!-- IN- connected to solar− rail -->
  <line x1="15"  y1="253" x2="6"   y2="253" stroke="#555" stroke-width="1.5"/>
  <line x1="6"   y1="253" x2="6"   y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- 18650 CELL  (210, 200)  130×65 -->
  <rect x="210" y="200" width="130" height="65" rx="6" fill="#1a3a1a" stroke="#90be6d" stroke-width="1.5"/>
  <text x="275" y="221" text-anchor="middle" fill="#90be6d" font-weight="bold">18650 Cell</text>
  <text x="275" y="236" text-anchor="middle" fill="#888" font-size="10">2000–3500 mAh</text>
  <text x="218" y="253" fill="#e63946" font-size="10">＋</text>
  <text x="298" y="253" fill="#555"    font-size="10">－</text>
  <circle cx="215" cy="258" r="3" fill="#f4a261"/>    <!-- BAT+ left -->
  <circle cx="338" cy="258" r="3" fill="#f4a261"/>    <!-- BAT− right -->

  <!-- TP4056 BAT+ ↔ 18650 + -->
  <line x1="175" y1="236" x2="215" y2="236" stroke="#f4a261" stroke-width="2"/>
  <line x1="215" y1="236" x2="215" y2="258" stroke="#f4a261" stroke-width="2"/>
  <!-- TP4056 BAT− ↔ 18650 − -->
  <line x1="175" y1="252" x2="200" y2="252" stroke="#f4a261" stroke-width="2"/>
  <line x1="200" y1="252" x2="200" y2="275" stroke="#f4a261" stroke-width="2"/>
  <line x1="200" y1="275" x2="338" y2="275" stroke="#f4a261" stroke-width="2"/>
  <line x1="338" y1="275" x2="338" y2="258" stroke="#f4a261" stroke-width="2"/>

  <!-- TP4056 OUT+ → XIAO BAT+  (routes up then right) -->
  <!-- OUT+ at (55, 298) → up → right → XIAO BAT+ at (330, 200) -->
  <line x1="55"  y1="298" x2="55"  y2="310" stroke="#e63946" stroke-width="2"/>
  <line x1="55"  y1="310" x2="250" y2="310" stroke="#e63946" stroke-width="2"/>
  <line x1="250" y1="310" x2="250" y2="182" stroke="#e63946" stroke-width="2"/>
  <line x1="250" y1="182" x2="330" y2="182" stroke="#e63946" stroke-width="2"/>
  <text x="140" y="308" fill="#e63946" font-size="9" text-anchor="middle">VOUT＋ → BAT＋</text>

  <!-- TP4056 OUT− → GND bus -->
  <line x1="115" y1="298" x2="115" y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════════════════════════
       XIAO ESP32-C6  (330, 160)  220×320
  ═════════════════════════════════════════════════════════════ -->
  <rect x="330" y="160" width="220" height="320" rx="8" fill="#1e1e3a" stroke="#6a4fc8" stroke-width="2"/>
  <text x="440" y="182" text-anchor="middle" fill="#c4a0f5" font-weight="bold" font-size="13">XIAO ESP32-C6</text>

  <!-- LEFT PINS (power in) at x=330 -->
  <text x="335" y="205" fill="#e63946" font-size="10">BAT＋</text>
  <text x="335" y="222" fill="#555"    font-size="10">BAT－</text>
  <circle cx="330" cy="200" r="3" fill="#e63946"/>
  <circle cx="330" cy="217" r="3" fill="#555"/>

  <!-- RIGHT PINS (sensor signals) at x=550 -->
  <!-- 3.3V -->
  <text x="543" y="210" fill="#e63946" font-size="10" text-anchor="end">3.3V ─</text>
  <circle cx="550" cy="205" r="3" fill="#e63946"/>
  <!-- GND -->
  <text x="543" y="228" fill="#555" font-size="10" text-anchor="end">GND ─</text>
  <circle cx="550" cy="223" r="3" fill="#555"/>
  <!-- A0 -->
  <text x="543" y="256" fill="#e9c46a" font-size="10" text-anchor="end">A0 ─</text>
  <circle cx="550" cy="251" r="3" fill="#e9c46a"/>
  <!-- GPIO0 SDA -->
  <text x="543" y="284" fill="#457b9d" font-size="10" text-anchor="end">GPIO0 SDA ─</text>
  <circle cx="550" cy="279" r="3" fill="#457b9d"/>
  <!-- GPIO1 SCL -->
  <text x="543" y="304" fill="#457b9d" font-size="10" text-anchor="end">GPIO1 SCL ─</text>
  <circle cx="550" cy="299" r="3" fill="#457b9d"/>
  <!-- GPIO2 1-Wire -->
  <text x="543" y="332" fill="#2a9d8f" font-size="10" text-anchor="end">GPIO2 ─</text>
  <circle cx="550" cy="327" r="3" fill="#2a9d8f"/>
  <!-- GPIO3 ADC -->
  <text x="543" y="362" fill="#e9c46a" font-size="10" text-anchor="end">GPIO3 ─</text>
  <circle cx="550" cy="357" r="3" fill="#e9c46a"/>
  <!-- GPIO4 Gate -->
  <text x="543" y="392" fill="#e9c46a" font-size="10" text-anchor="end">GPIO4 ─</text>
  <circle cx="550" cy="387" r="3" fill="#e9c46a"/>

  <!-- XIAO BAT+ from TP4056 OUT+ -->
  <line x1="330" y1="200" x2="250" y2="200" stroke="#e63946" stroke-width="2"/>
  <!-- junction dot where OUT+ line meets BAT+ pin -->
  <circle cx="250" cy="200" r="3.5" fill="#e63946"/>
  <!-- XIAO BAT− to GND bus -->
  <line x1="330" y1="217" x2="318" y2="217" stroke="#555" stroke-width="1.5"/>
  <line x1="318" y1="217" x2="318" y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════════════════════════
       BME280  (695, 158)  145×118
  ═════════════════════════════════════════════════════════════ -->
  <rect x="695" y="158" width="145" height="118" rx="5" fill="#1a2f1a" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="767" y="177" text-anchor="middle" fill="#90be6d" font-weight="bold">BME280</text>
  <text x="767" y="191" text-anchor="middle" fill="#888" font-size="10">3.3 V · I²C (addr 0x76)</text>
  <text x="700" y="212" fill="#e63946" font-size="10">VCC</text>
  <text x="700" y="230" fill="#555"    font-size="10">GND</text>
  <text x="700" y="253" fill="#457b9d" font-size="10">SDA</text>
  <text x="700" y="271" fill="#457b9d" font-size="10">SCL</text>
  <circle cx="695" cy="207" r="3" fill="#e63946"/>
  <circle cx="695" cy="225" r="3" fill="#555"/>
  <circle cx="695" cy="248" r="3" fill="#457b9d"/>
  <circle cx="695" cy="266" r="3" fill="#457b9d"/>

  <!-- 3.3V rail (horizontal) from XIAO to BME280 VCC -->
  <!-- 3.3V pin at (550,205), BME280 VCC at (695,207) -->
  <line x1="550" y1="205" x2="630" y2="205" stroke="#e63946" stroke-width="2"/>
  <line x1="630" y1="205" x2="630" y2="207" stroke="#e63946" stroke-width="2"/>
  <line x1="630" y1="207" x2="695" y2="207" stroke="#e63946" stroke-width="2"/>
  <text x="590" y="200" fill="#e63946" font-size="9" text-anchor="middle">3.3 V</text>

  <!-- GND rail from XIAO to BME280 GND -->
  <line x1="550" y1="223" x2="640" y2="223" stroke="#555" stroke-width="1.5"/>
  <line x1="640" y1="223" x2="640" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="640" y1="225" x2="695" y2="225" stroke="#555" stroke-width="1.5"/>

  <!-- GPIO0 SDA → BME280 SDA -->
  <line x1="550" y1="279" x2="620" y2="279" stroke="#457b9d" stroke-width="2"/>
  <line x1="620" y1="279" x2="620" y2="248" stroke="#457b9d" stroke-width="2"/>
  <line x1="620" y1="248" x2="695" y2="248" stroke="#457b9d" stroke-width="2"/>
  <text x="583" y="293" fill="#457b9d" font-size="9">SDA</text>

  <!-- GPIO1 SCL → BME280 SCL -->
  <line x1="550" y1="299" x2="610" y2="299" stroke="#457b9d" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="610" y1="299" x2="610" y2="266" stroke="#457b9d" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="610" y1="266" x2="695" y2="266" stroke="#457b9d" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="583" y="313" fill="#457b9d" font-size="9">SCL</text>

  <!-- ════════════════════════════════════════════════════════════
       DS18B20  (695, 318)  145×100
  ═════════════════════════════════════════════════════════════ -->
  <rect x="695" y="318" width="145" height="100" rx="5" fill="#2d1a0d" stroke="#f4a261" stroke-width="1.5"/>
  <text x="767" y="337" text-anchor="middle" fill="#f4a261" font-weight="bold">DS18B20</text>
  <text x="767" y="351" text-anchor="middle" fill="#888" font-size="10">1-Wire · waterproof probe</text>
  <text x="700" y="373" fill="#e63946" font-size="10">VCC</text>
  <text x="700" y="390" fill="#555"    font-size="10">GND</text>
  <text x="700" y="410" fill="#2a9d8f" font-size="10">DATA</text>
  <circle cx="695" cy="368" r="3" fill="#e63946"/>
  <circle cx="695" cy="385" r="3" fill="#555"/>
  <circle cx="695" cy="405" r="3" fill="#2a9d8f"/>

  <!-- GPIO2 → DS18B20 DATA (horizontal, direct) -->
  <line x1="550" y1="327" x2="600" y2="327" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="600" y1="327" x2="600" y2="405" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="600" y1="405" x2="695" y2="405" stroke="#2a9d8f" stroke-width="2"/>
  <text x="575" y="320" fill="#2a9d8f" font-size="9">1-Wire</text>

  <!-- 4.7kΩ pull-up: taps GPIO2 wire up to 3.3V rail -->
  <!-- Tap from GPIO2 wire at (600, 327), go up to 3.3V (630, 207) via resistor symbol -->
  <line x1="600" y1="327" x2="600" y2="295" stroke="#2a9d8f" stroke-width="1.5"/>
  <!-- Resistor box inline in pull-up wire -->
  <rect x="585" y="263" width="30" height="32" rx="3" fill="#2d2d44" stroke="#e9c46a" stroke-width="1.2"/>
  <text x="600" y="276" text-anchor="middle" fill="#e9c46a" font-size="8" font-weight="bold">4.7k</text>
  <text x="600" y="289" text-anchor="middle" fill="#e9c46a" font-size="7">Ω</text>
  <line x1="600" y1="263" x2="600" y2="207" stroke="#e63946" stroke-width="1.5"/>
  <!-- junction dot on 3.3V rail at x=600 -->
  <circle cx="600" cy="207" r="3.5" fill="#e63946"/>
  <!-- label -->
  <text x="613" y="283" fill="#e9c46a" font-size="9">pull-up</text>
  <text x="613" y="292" fill="#e9c46a" font-size="9">to 3.3V</text>

  <!-- DS18B20 GND → GND bus -->
  <line x1="695" y1="385" x2="680" y2="385" stroke="#555" stroke-width="1.5"/>
  <line x1="680" y1="385" x2="680" y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════════════════════════
       N-CH MOSFET  (555, 445)  145×80
       Gate=GPIO4, Drain=sensor VCC lines, Source=GND
  ═════════════════════════════════════════════════════════════ -->
  <rect x="555" y="445" width="145" height="80" rx="5" fill="#2d1f0d" stroke="#e9c46a" stroke-width="1.5"/>
  <text x="627" y="465" text-anchor="middle" fill="#e9c46a" font-weight="bold">N-CH MOSFET</text>
  <text x="627" y="479" text-anchor="middle" fill="#888" font-size="10">2N7000 / BS170</text>
  <text x="560" y="498" fill="#e9c46a" font-size="10">Gate</text>
  <text x="620" y="519" fill="#e63946" font-size="10">Drain → sensor VCC</text>
  <text x="620" y="533" fill="#555"    font-size="10">Source → GND</text>
  <circle cx="555" cy="493" r="3" fill="#e9c46a"/>    <!-- Gate left -->
  <circle cx="627" cy="525" r="3" fill="#e63946"/>    <!-- Drain bottom -->
  <circle cx="690" cy="525" r="3" fill="#555"/>       <!-- Source bottom -->

  <!-- GPIO4 → MOSFET Gate -->
  <line x1="550" y1="387" x2="540" y2="387" stroke="#e9c46a" stroke-width="2"/>
  <line x1="540" y1="387" x2="540" y2="493" stroke="#e9c46a" stroke-width="2"/>
  <line x1="540" y1="493" x2="555" y2="493" stroke="#e9c46a" stroke-width="2"/>
  <text x="534" y="440" fill="#e9c46a" font-size="9" text-anchor="end">GPIO4</text>

  <!-- MOSFET Drain → DS18B20 VCC + Soil VCC (power rail up) -->
  <!-- Drain at (627, 525) routes to sensor VCC lines -->
  <line x1="627" y1="525" x2="627" y2="560" stroke="#e63946" stroke-width="2"/>
  <line x1="627" y1="560" x2="668" y2="560" stroke="#e63946" stroke-width="2"/>
  <!-- up to DS18B20 VCC at (695, 368) -->
  <line x1="668" y1="560" x2="668" y2="368" stroke="#e63946" stroke-width="2"/>
  <line x1="668" y1="368" x2="695" y2="368" stroke="#e63946" stroke-width="2"/>
  <!-- junction where DS18B20 VCC and Soil VCC branch -->
  <circle cx="668" cy="490" r="3.5" fill="#e63946"/>

  <!-- MOSFET Source → GND bus -->
  <line x1="690" y1="525" x2="710" y2="525" stroke="#555" stroke-width="1.5"/>
  <line x1="710" y1="525" x2="710" y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════════════════════════
       CAPACITIVE SOIL SENSOR  (695, 460)  145×112
  ═════════════════════════════════════════════════════════════ -->
  <rect x="695" y="460" width="145" height="112" rx="5" fill="#1a2f1a" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="767" y="479" text-anchor="middle" fill="#90be6d" font-weight="bold">Soil Sensor</text>
  <text x="767" y="493" text-anchor="middle" fill="#888" font-size="10">Capacitive v1.2</text>
  <text x="700" y="514" fill="#e63946" font-size="10">VCC</text>
  <text x="700" y="532" fill="#555"    font-size="10">GND</text>
  <text x="700" y="551" fill="#e9c46a" font-size="10">AOUT</text>
  <text x="700" y="567" fill="#555"    font-size="10">GND (shield)</text>
  <circle cx="695" cy="509" r="3" fill="#e63946"/>
  <circle cx="695" cy="527" r="3" fill="#555"/>
  <circle cx="695" cy="546" r="3" fill="#e9c46a"/>
  <circle cx="695" cy="562" r="3" fill="#555"/>

  <!-- Soil VCC from MOSFET drain rail (668, 490) → (695, 509) -->
  <line x1="668" y1="490" x2="668" y2="509" stroke="#e63946" stroke-width="2"/>
  <line x1="668" y1="509" x2="695" y2="509" stroke="#e63946" stroke-width="2"/>

  <!-- Soil GND → GND bus -->
  <line x1="695" y1="527" x2="684" y2="527" stroke="#555" stroke-width="1.5"/>
  <line x1="684" y1="527" x2="684" y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- Soil AOUT → XIAO GPIO3  (routes left) -->
  <line x1="695" y1="546" x2="660" y2="546" stroke="#e9c46a" stroke-width="2"/>
  <line x1="660" y1="546" x2="660" y2="580" stroke="#e9c46a" stroke-width="2"/>
  <line x1="660" y1="580" x2="570" y2="580" stroke="#e9c46a" stroke-width="2"/>
  <line x1="570" y1="580" x2="570" y2="357" stroke="#e9c46a" stroke-width="2"/>
  <line x1="570" y1="357" x2="550" y2="357" stroke="#e9c46a" stroke-width="2"/>
  <text x="610" y="575" fill="#e9c46a" font-size="9" text-anchor="middle">AOUT → GPIO3</text>

  <!-- ════════════════════════════════════════════════════════════
       BATTERY VOLTAGE DIVIDER NOTE  (top-right)
  ═════════════════════════════════════════════════════════════ -->
  <rect x="695" y="55" width="155" height="80" rx="4" fill="#2d2d44" stroke="#888" stroke-width="1"/>
  <text x="772" y="73"  text-anchor="middle" fill="#aaa" font-size="10" font-weight="bold">Battery Divider</text>
  <text x="772" y="88"  text-anchor="middle" fill="#888" font-size="9">2× 220 kΩ resistors</text>
  <text x="772" y="101" text-anchor="middle" fill="#888" font-size="9">Vbat ──┤220k├──┤220k├── GND</text>
  <text x="772" y="114" text-anchor="middle" fill="#e9c46a" font-size="9">midpoint → A0</text>
  <text x="772" y="127" text-anchor="middle" fill="#888" font-size="9">(measures battery level)</text>
  <circle cx="695" cy="114" r="3" fill="#e9c46a"/>

  <!-- A0 → battery divider  (routes left from XIAO A0 pin up to note) -->
  <line x1="550" y1="251" x2="580" y2="251" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="580" y1="251" x2="580" y2="114" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="580" y1="114" x2="695" y2="114" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="583" y="247" fill="#e9c46a" font-size="9">A0</text>

  <!-- ════════════════════════════════════════════════════════════
       GND BUS  (y=638)
  ═════════════════════════════════════════════════════════════ -->
  <line x1="5" y1="638" x2="720" y2="638" stroke="#555" stroke-width="3"/>
  <text x="362" y="653" text-anchor="middle" fill="#555" font-size="10" font-weight="bold">⏚ Common Ground</text>
  <!-- XIAO GND pin to bus -->
  <line x1="318" y1="638" x2="318" y2="617" stroke="#555" stroke-width="1.5"/>
  <circle cx="318" cy="617" r="3" fill="#555"/>
  <text x="325" y="612" fill="#555" font-size="9">XIAO GND</text>
  <!-- BME280 GND to bus -->
  <line x1="640" y1="225" x2="640" y2="638" stroke="#555" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════════════════════════
