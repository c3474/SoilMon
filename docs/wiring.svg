<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760"
     font-family="Arial, Helvetica, sans-serif" font-size="11">

  <!-- ══ BACKGROUND ══ -->
  <rect width="1100" height="760" fill="#f0f2f5"/>

  <!-- ══ TITLE ══ -->
  <text x="550" y="24" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Garden Sensor — Wiring Diagram</text>
  <text x="550" y="40" text-anchor="middle" fill="#777" font-size="10">XIAO ESP32-C6 · BME280 · DS18B20 · Capacitive Soil Sensor · 18650 + Solar</text>

  <!-- ══════════════════════════════════════════════════════════
       WIRE ROUTES  (drawn before components so boxes sit on top)
  ══════════════════════════════════════════════════════════════ -->

  <!-- ── POWER (red) ─────────────────────────────────────── -->
  <!-- Solar+ → 1N5819 anode (enters box top) -->
  <line x1="52" y1="122" x2="52" y2="142" stroke="#d62828" stroke-width="2.5"/>
  <!-- 1N5819 cathode → TP4056 IN+ (routes around diode right side) -->
  <line x1="115" y1="155" x2="115" y2="175" stroke="#d62828" stroke-width="2.5"/>
  <line x1="115" y1="175" x2="60"  y2="175" stroke="#d62828" stroke-width="2.5"/>
  <line x1="60"  y1="175" x2="60"  y2="188" stroke="#d62828" stroke-width="2.5"/>
  <!-- TP4056 BAT+ → 18650 + -->
  <line x1="184" y1="218" x2="205" y2="218" stroke="#d62828" stroke-width="2.5"/>
  <line x1="205" y1="218" x2="205" y2="228" stroke="#d62828" stroke-width="2.5"/>
  <line x1="205" y1="228" x2="218" y2="228" stroke="#d62828" stroke-width="2.5"/>
  <!-- TP4056 OUT+ → XIAO BAT+ (routes below 18650) -->
  <line x1="65"  y1="310" x2="65"  y2="350" stroke="#d62828" stroke-width="2.5"/>
  <line x1="65"  y1="350" x2="373" y2="350" stroke="#d62828" stroke-width="2.5"/>
  <line x1="373" y1="350" x2="373" y2="192" stroke="#d62828" stroke-width="2.5"/>
  <line x1="373" y1="192" x2="382" y2="192" stroke="#d62828" stroke-width="2.5"/>
  <text x="215" y="346" fill="#d62828" font-size="9">OUT＋→ BAT＋</text>
  <!-- 3.3V rail: XIAO → BME280 VCC, DS18B20 VCC, Soil VCC -->
  <line x1="594" y1="183" x2="794" y2="183" stroke="#d62828" stroke-width="2"/>
  <!-- branch up to BME280 VCC -->
  <line x1="794" y1="183" x2="794" y2="166" stroke="#d62828" stroke-width="2"/>
  <line x1="794" y1="166" x2="802" y2="166" stroke="#d62828" stroke-width="2"/>
  <!-- branch down to DS18B20 VCC -->
  <line x1="794" y1="183" x2="794" y2="350" stroke="#d62828" stroke-width="2"/>
  <line x1="794" y1="350" x2="802" y2="350" stroke="#d62828" stroke-width="2"/>
  <!-- branch down to Soil VCC -->
  <line x1="794" y1="350" x2="794" y2="513" stroke="#d62828" stroke-width="2"/>
  <line x1="794" y1="513" x2="802" y2="513" stroke="#d62828" stroke-width="2"/>
  <!-- junction dots on 3.3V rail -->
  <circle cx="794" cy="183" r="4" fill="#d62828"/>
  <circle cx="794" cy="350" r="4" fill="#d62828"/>
  <text x="660" y="178" fill="#d62828" font-size="9" text-anchor="middle">3.3 V</text>

  <!-- ── GND (dark gray) ─────────────────────────────────── -->
  <!-- Left GND rail (Solar- and TP4056 IN-) down to bus -->
  <line x1="102" y1="122" x2="10"  y2="122" stroke="#444" stroke-width="2"/>
  <line x1="10"  y1="122" x2="10"  y2="650" stroke="#444" stroke-width="2"/>
  <!-- TP4056 IN- to left GND rail -->
  <line x1="22"  y1="220" x2="10"  y2="220" stroke="#444" stroke-width="2"/>
  <circle cx="10" cy="220" r="3.5" fill="#444"/>
  <!-- TP4056 OUT- down to GND bus -->
  <line x1="115" y1="310" x2="115" y2="650" stroke="#444" stroke-width="2"/>
  <!-- XIAO BAT- to GND bus -->
  <line x1="382" y1="214" x2="362" y2="214" stroke="#444" stroke-width="2"/>
  <line x1="362" y1="214" x2="362" y2="650" stroke="#444" stroke-width="2"/>
  <!-- BME280 GND rail: XIAO GND → BME280 GND, then drops to bus -->
  <line x1="594" y1="203" x2="784" y2="203" stroke="#444" stroke-width="2"/>
  <line x1="784" y1="203" x2="784" y2="186" stroke="#444" stroke-width="2"/>
  <line x1="784" y1="186" x2="802" y2="186" stroke="#444" stroke-width="2"/>
  <line x1="784" y1="203" x2="784" y2="650" stroke="#444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="784" cy="203" r="3.5" fill="#444"/>
  <!-- MOSFET Source to GND bus -->
  <line x1="688" y1="484" x2="688" y2="650" stroke="#444" stroke-width="2"/>
  <!-- MOSFET Drain rail → DS18B20 GND + Soil GND (switched GND path) -->
  <line x1="759" y1="438" x2="776" y2="438" stroke="#444" stroke-width="2"/>
  <line x1="776" y1="438" x2="776" y2="370" stroke="#444" stroke-width="2"/>
  <line x1="776" y1="370" x2="802" y2="370" stroke="#444" stroke-width="2"/>
  <line x1="776" y1="438" x2="776" y2="533" stroke="#444" stroke-width="2"/>
  <line x1="776" y1="533" x2="802" y2="533" stroke="#444" stroke-width="2"/>
  <circle cx="776" cy="438" r="3.5" fill="#444"/>
  <!-- TP4056 BAT- → 18650 - (routes below battery) -->
  <line x1="184" y1="238" x2="202" y2="238" stroke="#444" stroke-width="2"/>
  <line x1="202" y1="238" x2="202" y2="282" stroke="#444" stroke-width="2"/>
  <line x1="202" y1="282" x2="350" y2="282" stroke="#444" stroke-width="2"/>
  <line x1="350" y1="282" x2="350" y2="228" stroke="#444" stroke-width="2"/>

  <!-- ── I²C (blue, SDA solid / SCL dashed) ─────────────── -->
  <!-- SDA: XIAO GPIO0 → BME280 SDA (routes right then up along sensor left edge) -->
  <line x1="594" y1="278" x2="802" y2="278" stroke="#457b9d" stroke-width="2"/>
  <line x1="802" y1="278" x2="802" y2="218" stroke="#457b9d" stroke-width="2"/>
  <text x="692" y="272" fill="#457b9d" font-size="9" text-anchor="middle">SDA</text>
  <!-- SCL: XIAO GPIO1 → BME280 SCL -->
  <line x1="594" y1="300" x2="806" y2="300" stroke="#457b9d" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="806" y1="300" x2="806" y2="240" stroke="#457b9d" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="806" y1="240" x2="802" y2="240" stroke="#457b9d" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="692" y="316" fill="#457b9d" font-size="9" text-anchor="middle">SCL</text>

  <!-- ── 1-Wire + 4.7 kΩ pull-up (teal) ────────────────── -->
  <!-- GPIO2 → (762,333) junction → DS18B20 DATA -->
  <line x1="594" y1="333" x2="762" y2="333" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="762" y1="333" x2="792" y2="333" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="792" y1="333" x2="792" y2="396" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="792" y1="396" x2="802" y2="396" stroke="#2a9d8f" stroke-width="2"/>
  <circle cx="762" cy="333" r="3.5" fill="#2a9d8f"/>
  <text x="672" y="328" fill="#2a9d8f" font-size="9" text-anchor="middle">1-Wire</text>
  <!-- 4.7kΩ pull-up wire from junction up to 3.3V rail -->
  <line x1="762" y1="333" x2="762" y2="275" stroke="#2a9d8f" stroke-width="1.5"/>
  <!-- pull-up resistor box -->
  <rect x="747" y="243" width="30" height="32" rx="3" fill="#fff8e1" stroke="#e9852a" stroke-width="1.5"/>
  <text x="762" y="256" text-anchor="middle" fill="#c77b00" font-size="8" font-weight="bold">4.7k</text>
  <text x="762" y="269" text-anchor="middle" fill="#c77b00" font-size="8">Ω</text>
  <line x1="762" y1="243" x2="762" y2="183" stroke="#d62828" stroke-width="1.5"/>
  <!-- junction on 3.3V rail at x=762 -->
  <circle cx="762" cy="183" r="3.5" fill="#d62828"/>
  <text x="770" y="218" fill="#c77b00" font-size="9">pull-up</text>

  <!-- ── GPIO3 → Soil AOUT (orange, routes below MOSFET along bottom) -->
  <line x1="594" y1="366" x2="597" y2="366" stroke="#e9852a" stroke-width="2"/>
  <line x1="597" y1="366" x2="597" y2="625" stroke="#e9852a" stroke-width="2"/>
  <line x1="597" y1="625" x2="802" y2="625" stroke="#e9852a" stroke-width="2"/>
  <line x1="802" y1="625" x2="802" y2="558" stroke="#e9852a" stroke-width="2"/>
  <text x="697" y="620" fill="#e9852a" font-size="9" text-anchor="middle">AOUT → GPIO3</text>

  <!-- ── GPIO4 → MOSFET Gate (orange) ──────────────────── -->
  <line x1="594" y1="399" x2="607" y2="399" stroke="#e9852a" stroke-width="2"/>
  <line x1="607" y1="399" x2="607" y2="438" stroke="#e9852a" stroke-width="2"/>
  <line x1="607" y1="438" x2="617" y2="438" stroke="#e9852a" stroke-width="2"/>
  <text x="600" y="420" fill="#e9852a" font-size="9">GPIO4</text>

  <!-- ── A0 label (no complex routing, noted at pin) ──────── -->

  <!-- ══════════════════════════════════════════════════════════
       COMPONENTS  (drawn on top of wires)
  ══════════════════════════════════════════════════════════════ -->

  <!-- ── SOLAR PANEL (22,52) 112×70 ── -->
  <rect x="22" y="52" width="112" height="70" rx="6" fill="#e8f4fd" stroke="#1a6fa8" stroke-width="1.8"/>
  <text x="78" y="73"  text-anchor="middle" fill="#1a6fa8" font-weight="bold">Solar Panel</text>
  <text x="78" y="88"  text-anchor="middle" fill="#666" font-size="10">6 V · 1–2 W</text>
  <text x="40" y="107" fill="#d62828" font-size="11" font-weight="bold">＋</text>
  <text x="88" y="107" fill="#444"    font-size="11" font-weight="bold">－</text>
  <circle cx="52"  cy="122" r="4" fill="#d62828"/>
  <circle cx="102" cy="122" r="4" fill="#444"/>

  <!-- ── 1N5819 DIODE (37,142) 78×26 ── -->
  <rect x="37" y="142" width="78" height="26" rx="3" fill="#fffde7" stroke="#c77b00" stroke-width="1.5"/>
  <text x="76" y="152" text-anchor="middle" fill="#c77b00" font-size="10" font-weight="bold">1N5819</text>
  <text x="76" y="163" text-anchor="middle" fill="#999" font-size="9">Schottky ▶|</text>
  <circle cx="37"  cy="155" r="3" fill="#d62828"/>  <!-- anode  -->
  <circle cx="115" cy="155" r="3" fill="#d62828"/>  <!-- cathode -->

  <!-- ── TP4056 (22,188) 162×122 ── -->
  <rect x="22" y="188" width="162" height="122" rx="6" fill="#e8f4fd" stroke="#1a6fa8" stroke-width="1.8"/>
  <text x="103" y="208" text-anchor="middle" fill="#1a6fa8" font-weight="bold">TP4056</text>
  <text x="103" y="222" text-anchor="middle" fill="#888" font-size="10">Charge controller</text>
  <text x="103" y="235" text-anchor="middle" fill="#888" font-size="10">with protection</text>
  <!-- pin labels -->
  <text x="27"  y="252" fill="#d62828" font-size="10">IN＋</text>
  <text x="27"  y="268" fill="#444"    font-size="10">IN－</text>
  <text x="108" y="252" fill="#d62828" font-size="10">BAT＋</text>
  <text x="108" y="268" fill="#444"    font-size="10">BAT－</text>
  <text x="38"  y="302" fill="#d62828" font-size="10">OUT＋</text>
  <text x="96"  y="302" fill="#444"    font-size="10">OUT－</text>
  <!-- pin dots -->
  <circle cx="22"  cy="220" r="3.5" fill="#d62828"/>  <!-- IN+  top -->
  <circle cx="22"  cy="220" r="3.5" fill="#444"/>      <!-- IN-  left (same side, different y) -->
  <circle cx="22"  cy="220" r="3.5" fill="#d62828"/>
  <circle cx="22"  cy="220" r="3.5" fill="#444"/>
  <circle cx="184" cy="218" r="3.5" fill="#d62828"/>  <!-- BAT+ right -->
  <circle cx="184" cy="238" r="3.5" fill="#444"/>      <!-- BAT- right -->
  <circle cx="65"  cy="310" r="3.5" fill="#d62828"/>  <!-- OUT+ bottom -->
  <circle cx="115" cy="310" r="3.5" fill="#444"/>      <!-- OUT- bottom -->
  <!-- Correct IN+/IN- pin dots on top edge -->
  <circle cx="60"  cy="188" r="3.5" fill="#d62828"/>  <!-- IN+ top -->
  <circle cx="22"  cy="220" r="3.5" fill="#444"/>      <!-- IN- left -->

  <!-- ── 18650 CELL (218,202) 132×72 ── -->
  <rect x="218" y="202" width="132" height="72" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="284" y="224" text-anchor="middle" fill="#2e7d32" font-weight="bold">18650 Cell</text>
  <text x="284" y="239" text-anchor="middle" fill="#888" font-size="10">2000–3500 mAh</text>
  <text x="230" y="258" fill="#d62828" font-size="12" font-weight="bold">＋</text>
  <text x="312" y="258" fill="#444"    font-size="12" font-weight="bold">－</text>
  <circle cx="218" cy="228" r="3.5" fill="#d62828"/>  <!-- + left  -->
  <circle cx="350" cy="228" r="3.5" fill="#444"/>      <!-- - right -->

  <!-- ── XIAO ESP32-C6 (382,148) 212×350 ── -->
  <rect x="382" y="148" width="212" height="350" rx="8" fill="#f3e5ff" stroke="#6a1fb5" stroke-width="2"/>
  <text x="488" y="172" text-anchor="middle" fill="#6a1fb5" font-weight="bold" font-size="13">XIAO ESP32-C6</text>
  <text x="488" y="188" text-anchor="middle" fill="#9c5fc4" font-size="10">Matter / Thread · 802.15.4</text>
  <!-- LEFT pins: power -->
  <text x="388" y="196" fill="#d62828" font-size="10">BAT＋</text>
  <text x="388" y="218" fill="#444"    font-size="10">BAT－</text>
  <circle cx="382" cy="192" r="3.5" fill="#d62828"/>
  <circle cx="382" cy="214" r="3.5" fill="#444"/>
  <!-- RIGHT pins: signals -->
  <text x="588" y="187" fill="#d62828" font-size="10" text-anchor="end">3.3 V ─</text>
  <text x="588" y="207" fill="#444"    font-size="10" text-anchor="end">GND ─</text>
  <text x="588" y="244" fill="#e9852a" font-size="10" text-anchor="end">A0 ─</text>
  <text x="588" y="282" fill="#457b9d" font-size="10" text-anchor="end">GPIO0 SDA ─</text>
  <text x="588" y="304" fill="#457b9d" font-size="10" text-anchor="end">GPIO1 SCL ─</text>
  <text x="588" y="337" fill="#2a9d8f" font-size="10" text-anchor="end">GPIO2 1-Wire ─</text>
  <text x="588" y="370" fill="#e9852a" font-size="10" text-anchor="end">GPIO3 ADC ─</text>
  <text x="588" y="403" fill="#e9852a" font-size="10" text-anchor="end">GPIO4 Gate ─</text>
  <!-- right pin dots -->
  <circle cx="594" cy="183" r="3.5" fill="#d62828"/>
  <circle cx="594" cy="203" r="3.5" fill="#444"/>
  <circle cx="594" cy="240" r="3.5" fill="#e9852a"/>
  <circle cx="594" cy="278" r="3.5" fill="#457b9d"/>
  <circle cx="594" cy="300" r="3.5" fill="#457b9d"/>
  <circle cx="594" cy="333" r="3.5" fill="#2a9d8f"/>
  <circle cx="594" cy="366" r="3.5" fill="#e9852a"/>
  <circle cx="594" cy="399" r="3.5" fill="#e9852a"/>
  <!-- A0 note inline -->
  <text x="488" y="470" text-anchor="middle" fill="#888" font-size="9">A0 → 2×220 kΩ divider</text>
  <text x="488" y="482" text-anchor="middle" fill="#888" font-size="9">(measures battery voltage)</text>

  <!-- ── N-CH MOSFET (617,392) 142×92 ── -->
  <!-- Low-side switch: GPIO4 gate controls sensor GND path -->
  <rect x="617" y="392" width="142" height="92" rx="6" fill="#fffde7" stroke="#c77b00" stroke-width="1.8"/>
  <text x="688" y="412" text-anchor="middle" fill="#c77b00" font-weight="bold">N-CH MOSFET</text>
  <text x="688" y="426" text-anchor="middle" fill="#888" font-size="10">2N7000 / BS170</text>
  <text x="622" y="443" fill="#e9852a" font-size="10">Gate</text>
  <text x="622" y="458" fill="#444"    font-size="10">Drain → sensor GND</text>
  <text x="622" y="473" fill="#444"    font-size="10">Source → GND</text>
  <circle cx="617" cy="438" r="3.5" fill="#e9852a"/>   <!-- Gate  left  -->
  <circle cx="759" cy="438" r="3.5" fill="#444"/>       <!-- Drain right  -->
  <circle cx="688" cy="484" r="3.5" fill="#444"/>       <!-- Source bottom -->

  <!-- ── BME280 (802,132) 152×132 ── -->
  <rect x="802" y="132" width="152" height="132" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="878" y="152" text-anchor="middle" fill="#2e7d32" font-weight="bold">BME280</text>
  <text x="878" y="166" text-anchor="middle" fill="#888" font-size="10">3.3 V · I²C · addr 0x76</text>
  <text x="807" y="185" fill="#d62828" font-size="10">VCC</text>
  <text x="807" y="203" fill="#444"    font-size="10">GND</text>
  <text x="807" y="232" fill="#457b9d" font-size="10">SDA</text>
  <text x="807" y="254" fill="#457b9d" font-size="10">SCL</text>
  <circle cx="802" cy="166" r="3.5" fill="#d62828"/>
  <circle cx="802" cy="186" r="3.5" fill="#444"/>
  <circle cx="802" cy="218" r="3.5" fill="#457b9d"/>
  <circle cx="802" cy="240" r="3.5" fill="#457b9d"/>

  <!-- ── DS18B20 (802,320) 152×114 ── -->
  <rect x="802" y="320" width="152" height="114" rx="6" fill="#fff8e1" stroke="#e65100" stroke-width="1.8"/>
  <text x="878" y="340" text-anchor="middle" fill="#e65100" font-weight="bold">DS18B20</text>
  <text x="878" y="354" text-anchor="middle" fill="#888" font-size="10">1-Wire · waterproof probe</text>
  <text x="807" y="370" fill="#d62828" font-size="10">VCC</text>
  <text x="807" y="388" fill="#444"    font-size="10">GND</text>
  <text x="807" y="412" fill="#2a9d8f" font-size="10">DATA</text>
  <circle cx="802" cy="350" r="3.5" fill="#d62828"/>
  <circle cx="802" cy="370" r="3.5" fill="#444"/>
  <circle cx="802" cy="396" r="3.5" fill="#2a9d8f"/>

  <!-- ── SOIL SENSOR (802,482) 152×122 ── -->
  <rect x="802" y="482" width="152" height="122" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="878" y="502" text-anchor="middle" fill="#2e7d32" font-weight="bold">Soil Sensor</text>
  <text x="878" y="516" text-anchor="middle" fill="#888" font-size="10">Capacitive v1.2</text>
  <text x="807" y="534" fill="#d62828" font-size="10">VCC</text>
  <text x="807" y="552" fill="#444"    font-size="10">GND</text>
  <text x="807" y="574" fill="#e9852a" font-size="10">AOUT</text>
  <circle cx="802" cy="513" r="3.5" fill="#d62828"/>
  <circle cx="802" cy="533" r="3.5" fill="#444"/>
  <circle cx="802" cy="558" r="3.5" fill="#e9852a"/>

  <!-- ══ GND BUS ══ -->
  <line x1="10" y1="650" x2="970" y2="650" stroke="#333" stroke-width="3.5"/>
  <text x="490" y="666" text-anchor="middle" fill="#555" font-size="10" font-weight="bold">⏚  Common Ground</text>

  <!-- ══ LEGEND ══ -->
  <g transform="translate(12, 685)">
    <text fill="#555" font-size="10" font-weight="bold">Wire key:</text>
    <line x1="68"  y1="-3" x2="93"  y2="-3" stroke="#d62828" stroke-width="2.5"/><text x="96"  fill="#d62828" font-size="10">Power / 3.3 V</text>
    <line x1="195" y1="-3" x2="220" y2="-3" stroke="#444"    stroke-width="2.5"/><text x="223" fill="#555"    font-size="10">Ground</text>
    <line x1="283" y1="-3" x2="308" y2="-3" stroke="#457b9d" stroke-width="2.5"/><text x="311" fill="#457b9d" font-size="10">I²C SDA (solid) / SCL (dashed)</text>
    <line x1="495" y1="-3" x2="520" y2="-3" stroke="#2a9d8f" stroke-width="2.5"/><text x="523" fill="#2a9d8f" font-size="10">1-Wire (DS18B20)</text>
    <line x1="635" y1="-3" x2="660" y2="-3" stroke="#e9852a" stroke-width="2.5"/><text x="663" fill="#e9852a" font-size="10">GPIO / ADC</text>
  </g>

  <!-- ══ MOSFET NOTE ══ -->
  <text x="688" y="510" text-anchor="middle" fill="#888" font-size="9">Low-side switch:</text>
  <text x="688" y="522" text-anchor="middle" fill="#888" font-size="9">cuts sensor GND during sleep</text>

</svg>
